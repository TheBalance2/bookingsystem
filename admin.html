<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Admin login for the San Isidro College Digital Reservation System.">
  <title>Admin Login — San Isidro College</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ============================================================
       LOGIN PAGE
       ============================================================ -->
  <div class="login-page">
    <div class="login-card">
      <div class="login-header">
        <img src="images/logo.jpg" alt="SIC Logo" class="login-logo" style="background: transparent; object-fit: contain;">
        <h1>Admin Portal</h1>
        <p class="login-subtitle">Sign in to manage reservations</p>
      </div>

      <div class="login-error" id="loginError">
        Invalid email or password. Please try again.
      </div>

      <form class="login-form" id="loginForm" novalidate>
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" placeholder="admin@sic.edu.ph" required>
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn">
          Sign In
        </button>
      </form>

      <div style="text-align:center; margin-top:var(--space-xl);">
        <a href="index.html" style="color:var(--gray-300); font-size:0.85rem;">
          ← Back to Homepage
        </a>
      </div>
    </div>
  </div>

  <!-- ============================================================
       SCRIPTS
       ============================================================ -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>

  <script>
    // Redirect if already logged in
    auth.onAuthStateChanged(user => {
      if (user) window.location.href = 'dashboard.html';
    });

    // Login handler
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('loginError');

      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        errorEl.textContent = 'Please fill in all fields.';
        errorEl.classList.add('visible');
        return;
      }

      btn.innerHTML = '<span class="spinner"></span> Signing in...';
      btn.classList.add('loading');
      errorEl.classList.remove('visible');

      try {
        await auth.signInWithEmailAndPassword(email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        let msg = 'Invalid email or password. Please try again.';
        if (err.code === 'auth/user-not-found') msg = 'No admin account found with this email.';
        if (err.code === 'auth/wrong-password') msg = 'Incorrect password. Please try again.';
        if (err.code === 'auth/too-many-requests') msg = 'Too many failed attempts. Try again later.';
        errorEl.textContent = msg;
        errorEl.classList.add('visible');
        btn.innerHTML = 'Sign In';
        btn.classList.remove('loading');
      }
    });
  </script>
</body>
</html>
